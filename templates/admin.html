<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentAI — Admin</title>
<style>
:root{--bg:#09090f;--card:#17172a;--border:#2b2b45;--primary:#6d28d9;
  --text:#e8e8f4;--muted:#8888aa;--success:#10b981;--error:#ef4444;--warn:#f59e0b}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);padding:32px 24px}
h1{font-size:1.4rem;font-weight:700;margin-bottom:6px}
.sub{color:var(--muted);font-size:14px;margin-bottom:28px}
table{width:100%;border-collapse:collapse;background:var(--card);
  border:1px solid var(--border);border-radius:12px;overflow:hidden}
th{text-align:left;padding:12px 16px;font-size:12px;font-weight:700;
  color:var(--muted);text-transform:uppercase;letter-spacing:.6px;
  background:#111120;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600}
.active{background:#064e3b;color:#6ee7b7}
.inactive{background:#1a1a2e;color:var(--muted)}
.cancelled{background:#450a0a;color:#fca5a5}
.btn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
  border:none;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-green{background:#059669;color:#fff}
.btn-red{background:#dc2626;color:#fff}
.avatar{width:28px;height:28px;border-radius:50%;vertical-align:middle;margin-right:8px}
</style>
</head>
<body>
<h1>ContentAI Admin</h1>
<p class="sub">{{ users|length }} users registered</p>

<table>
  <thead>
    <tr>
      <th>User</th>
      <th>Email</th>
      <th>Plan</th>
      <th>Status</th>
      <th>Joined</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for u in users %}
    <tr id="row-{{ u.id|replace('|','-') }}">
      <td>
        {% if u.picture %}<img class="avatar" src="{{ u.picture }}" alt="">{% endif %}
        {{ u.name or '—' }}
      </td>
      <td>{{ u.email }}</td>
      <td>{{ u.plan }}</td>
      <td><span class="badge {{ u.plan_status }}">{{ u.plan_status }}</span></td>
      <td>{{ u.created_at[:10] if u.created_at else '—' }}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-green"
                onclick="activate('{{ u.id }}','pro')">Activate Pro</button>
        <button class="btn btn-red"
                onclick="cancelUser('{{ u.id }}')">Cancel</button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<script>
async function activate(userId, plan) {
  const res = await fetch('/admin/api/activate', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({user_id: userId, plan})
  });
  if ((await res.json()).ok) location.reload();
}
async function cancelUser(userId) {
  if (!confirm('Cancel this user\'s plan?')) return;
  const res = await fetch('/admin/api/cancel', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({user_id: userId})
  });
  if ((await res.json()).ok) location.reload();
}
</script>
</body>
</html>
